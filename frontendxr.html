<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MedScan AI</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: { dm: ['DM Sans', 'sans-serif'] },
      colors: {
        med: { 50:'#eefbf3', 100:'#d6f5e2', 200:'#b0eac9', 400:'#34d37a', 500:'#10b958', 600:'#0e9a4a' },
        navy: { 800:'#0f2030', 900:'#091520' }
      }
    }
  }
}
</script>
  <style>
  html, body { height: 100%; margin: 0; }
  .app-shell { height: 100%; overflow: auto; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
  @keyframes pulse-ring { 0% { transform:scale(.8); opacity:.6; } 100% { transform:scale(1.6); opacity:0; } }
  @keyframes scan-line { 0% { top:0; } 100% { top:100%; } }
  .fade-up { animation: fadeUp .5s ease both; }
  .fade-up-d1 { animation-delay:.1s; }
  .fade-up-d2 { animation-delay:.2s; }
  .fade-up-d3 { animation-delay:.3s; }
  .fade-up-d4 { animation-delay:.4s; }
  .pulse-ring { animation: pulse-ring 1.8s ease infinite; }
  .scan-line { animation: scan-line 2s ease-in-out infinite alternate; }
  .xray-zone { position:relative; overflow:hidden; }
  .xray-zone::after { content:''; position:absolute; left:0; width:100%; height:3px; background:linear-gradient(90deg,transparent,#34d37a,transparent); scan-line; pointer-events:none; top:0; animation: scan-line 2s ease-in-out infinite alternate; }
  .risk-high { background:#fef2f2; border-color:#ef4444; color:#b91c1c; }
  .risk-medium { background:#fffbeb; border-color:#f59e0b; color:#92400e; }
  .risk-low { background:#eefbf3; border-color:#10b958; color:#0e9a4a; }
  input[type="range"]::-webkit-slider-thumb { -webkit-appearance:none; width:18px; height:18px; border-radius:50%; background:#10b958; cursor:pointer; }
  input[type="range"] { -webkit-appearance:none; height:6px; border-radius:999px; background:#d6f5e2; }
  .checkbox-custom:checked { background-color:#10b958; border-color:#10b958; }
</style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full bg-navy-900 font-dm text-white">
  <div class="app-shell" id="appShell"><!-- ===== PAGE 1: HOME ===== -->
   <section id="pageHome" class="min-h-full flex flex-col items-center justify-center px-4 py-12 relative">
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
     <div class="absolute top-1/4 left-1/4 w-72 h-72 rounded-full bg-med-500 opacity-5 blur-3xl"></div>
     <div class="absolute bottom-1/4 right-1/4 w-96 h-96 rounded-full bg-teal-500 opacity-5 blur-3xl"></div>
    </div>
    <div class="relative z-10 text-center max-w-lg w-full">
     <div class="fade-up flex justify-center mb-6">
      <div class="relative">
       <div class="w-20 h-20 rounded-2xl bg-gradient-to-br from-med-400 to-teal-500 flex items-center justify-center"><i data-lucide="scan-line" class="w-10 h-10 text-white"></i>
       </div>
       <div class="absolute inset-0 rounded-2xl bg-med-400 opacity-30 pulse-ring"></div>
      </div>
     </div>
     <h1 id="elTitle" class="fade-up fade-up-d1 text-4xl sm:text-5xl font-bold tracking-tight mb-3">MedScan AI</h1>
     <p id="elTagline" class="fade-up fade-up-d2 text-slate-400 text-lg mb-10">AI-Powered Chest X-Ray Analysis</p><!-- Upload area -->
     <div class="fade-up fade-up-d3 mb-6"><label id="uploadArea" class="block border-2 border-dashed border-slate-600 hover:border-med-400 rounded-2xl p-8 cursor-pointer transition-colors group"> <input type="file" accept="image/*" class="hidden" id="xrayInput">
       <div class="flex flex-col items-center gap-3">
        <div class="w-14 h-14 rounded-xl bg-slate-800 group-hover:bg-med-500/20 flex items-center justify-center transition-colors"><i data-lucide="upload-cloud" class="w-7 h-7 text-slate-400 group-hover:text-med-400 transition-colors"></i>
        </div><span class="text-slate-300 font-medium" id="uploadLabel">Upload Chest X-Ray</span> <span class="text-xs text-slate-500">PNG, JPG up to 10MB</span>
       </div></label>
     </div><!-- Preview -->
     <div id="previewWrap" class="hidden fade-up mb-6">
      <div class="xray-zone rounded-2xl overflow-hidden bg-slate-800 mx-auto max-w-xs">
       <canvas id="previewCanvas" class="w-full"></canvas>
      </div>
      <p id="fileName" class="text-xs text-slate-500 mt-2"></p>
     </div><button id="btnStart" onclick="goToPage('pageForm')" class="fade-up fade-up-d4 w-full sm:w-auto px-10 py-4 rounded-xl bg-gradient-to-r from-med-500 to-teal-500 hover:from-med-600 hover:to-teal-600 font-semibold text-lg transition-all shadow-lg shadow-med-500/20 disabled:opacity-40 disabled:cursor-not-allowed" disabled> <span class="flex items-center justify-center gap-2"><i data-lucide="activity" class="w-5 h-5"></i> Start Analysis</span> </button>
    </div>
   </section><!-- ===== PAGE 2: PATIENT FORM ===== -->
   <section id="pageForm" class="hidden min-h-full flex flex-col px-4 py-8">
    <div class="max-w-xl w-full mx-auto flex-1"><button onclick="goToPage('pageHome')" class="flex items-center gap-1 text-slate-400 hover:text-white mb-6 transition-colors text-sm"> <i data-lucide="arrow-left" class="w-4 h-4"></i> Back </button>
     <h2 class="text-2xl font-bold mb-1">Patient Details</h2>
     <p class="text-slate-400 text-sm mb-8">Complete the form to generate a diagnostic report.</p>
     <form id="patientForm" class="space-y-6" onsubmit="return false;"><!-- Age & Gender -->
      <div class="grid grid-cols-2 gap-4">
       <div><label for="age" class="block text-sm font-medium text-slate-300 mb-1">Age</label> <input type="number" id="age" min="0" max="120" value="35" class="w-full rounded-xl bg-slate-800 border border-slate-700 focus:border-med-400 focus:ring-1 focus:ring-med-400 outline-none px-4 py-3 text-white">
       </div>
       <div><label for="gender" class="block text-sm font-medium text-slate-300 mb-1">Gender</label> <select id="gender" class="w-full rounded-xl bg-slate-800 border border-slate-700 focus:border-med-400 focus:ring-1 focus:ring-med-400 outline-none px-4 py-3 text-white appearance-none"> <option>Male</option><option>Female</option><option>Other</option> </select>
       </div>
      </div><!-- Symptoms checkboxes -->
      <fieldset><legend class="text-sm font-medium text-slate-300 mb-3">Symptoms</legend>
       <div class="grid grid-cols-2 gap-3" id="symptomsGrid"><label class="flex items-center gap-2 bg-slate-800/60 rounded-xl px-4 py-3 cursor-pointer hover:bg-slate-800 transition-colors"> <input type="checkbox" class="checkbox-custom w-4 h-4 rounded border-slate-600 accent-green-500" value="cough"> <span class="text-sm">Cough</span> </label> <label class="flex items-center gap-2 bg-slate-800/60 rounded-xl px-4 py-3 cursor-pointer hover:bg-slate-800 transition-colors"> <input type="checkbox" class="checkbox-custom w-4 h-4 rounded border-slate-600 accent-green-500" value="breathlessness"> <span class="text-sm">Breathlessness</span> </label> <label class="flex items-center gap-2 bg-slate-800/60 rounded-xl px-4 py-3 cursor-pointer hover:bg-slate-800 transition-colors"> <input type="checkbox" class="checkbox-custom w-4 h-4 rounded border-slate-600 accent-green-500" value="fatigue"> <span class="text-sm">Fatigue</span> </label> <label class="flex items-center gap-2 bg-slate-800/60 rounded-xl px-4 py-3 cursor-pointer hover:bg-slate-800 transition-colors"> <input type="checkbox" class="checkbox-custom w-4 h-4 rounded border-slate-600 accent-green-500" value="weight_loss"> <span class="text-sm">Weight Loss</span> </label> <label class="flex items-center gap-2 bg-slate-800/60 rounded-xl px-4 py-3 cursor-pointer hover:bg-slate-800 transition-colors"> <input type="checkbox" class="checkbox-custom w-4 h-4 rounded border-slate-600 accent-green-500" value="night_sweats"> <span class="text-sm">Night Sweats</span> </label> <label class="flex items-center gap-2 bg-slate-800/60 rounded-xl px-4 py-3 cursor-pointer hover:bg-slate-800 transition-colors"> <input type="checkbox" class="checkbox-custom w-4 h-4 rounded border-slate-600 accent-green-500" value="chest_tightness"> <span class="text-sm">Chest Tightness</span> </label>
       </div>
      </fieldset><!-- Fever -->
      <div><label class="block text-sm font-medium text-slate-300 mb-2">Fever</label>
       <div class="flex gap-3"><button type="button" onclick="selectFever(this,'yes')" class="fever-btn flex-1 py-3 rounded-xl border border-slate-700 bg-slate-800 text-sm font-medium transition-all hover:border-med-400">Yes</button> <button type="button" onclick="selectFever(this,'no')" class="fever-btn flex-1 py-3 rounded-xl border border-med-400 bg-med-500/20 text-med-400 text-sm font-medium transition-all">No</button>
       </div>
      </div><!-- Oxygen -->
      <div><label for="oxygen" class="block text-sm font-medium text-slate-300 mb-1">Oxygen Level: <span id="o2Val" class="text-med-400 font-semibold">96</span>%</label> <input type="range" id="oxygen" min="70" max="100" value="96" class="w-full" oninput="document.getElementById('o2Val').textContent=this.value">
      </div><!-- Chest pain -->
      <div><label class="block text-sm font-medium text-slate-300 mb-2">Chest Pain</label>
       <div class="flex gap-3"><button type="button" onclick="selectChestPain(this,'yes')" class="cp-btn flex-1 py-3 rounded-xl border border-slate-700 bg-slate-800 text-sm font-medium transition-all hover:border-med-400">Yes</button> <button type="button" onclick="selectChestPain(this,'no')" class="cp-btn flex-1 py-3 rounded-xl border border-med-400 bg-med-500/20 text-med-400 text-sm font-medium transition-all">No</button>
       </div>
      </div><!-- Cough duration -->
      <div><label for="coughDur" class="block text-sm font-medium text-slate-300 mb-1">Cough Duration</label> <select id="coughDur" class="w-full rounded-xl bg-slate-800 border border-slate-700 focus:border-med-400 focus:ring-1 focus:ring-med-400 outline-none px-4 py-3 text-white appearance-none"> <option>No cough</option><option>Less than 1 week</option><option>1–2 weeks</option><option>2–4 weeks</option><option>More than 4 weeks</option> </select>
      </div><button type="button" onclick="runAnalysis()" class="w-full py-4 rounded-xl bg-gradient-to-r from-med-500 to-teal-500 hover:from-med-600 hover:to-teal-600 font-semibold text-lg transition-all shadow-lg shadow-med-500/20 flex items-center justify-center gap-2"> <i data-lucide="zap" class="w-5 h-5"></i> Run Analysis </button>
     </form>
    </div>
   </section><!-- ===== PAGE 3: RESULTS ===== -->
   <section id="pageResult" class="hidden min-h-full flex flex-col px-4 py-8">
    <div class="max-w-2xl w-full mx-auto flex-1"><button onclick="goToPage('pageForm')" class="flex items-center gap-1 text-slate-400 hover:text-white mb-6 transition-colors text-sm"> <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Form </button> <!-- Analyzing overlay -->
     <div id="analyzing" class="flex flex-col items-center justify-center py-20">
      <div class="w-16 h-16 rounded-full border-4 border-med-400 border-t-transparent animate-spin mb-4"></div>
      <p class="text-lg font-medium">Analyzing X-Ray…</p>
      <p class="text-slate-400 text-sm">Running AI diagnostics</p>
     </div><!-- Results content -->
     <div id="resultsContent" class="hidden space-y-6">
      <div class="flex items-center justify-between flex-wrap gap-4">
       <h2 class="text-2xl font-bold">Diagnostic Report</h2><span id="riskBadge" class="px-4 py-1.5 rounded-full text-sm font-semibold border"></span>
      </div><!-- Top cards -->
      <div class="grid sm:grid-cols-2 gap-4">
       <div class="bg-slate-800/70 rounded-2xl p-5 border border-slate-700">
        <p class="text-xs text-slate-400 uppercase tracking-wider mb-1">Disease Detected</p>
        <p id="resDisease" class="text-xl font-bold text-med-400"></p>
       </div>
       <div class="bg-slate-800/70 rounded-2xl p-5 border border-slate-700">
        <p class="text-xs text-slate-400 uppercase tracking-wider mb-1">Confidence</p>
        <div class="flex items-end gap-2">
         <p id="resConf" class="text-xl font-bold text-white"></p>
         <div class="flex-1 h-2 bg-slate-700 rounded-full overflow-hidden mb-1">
          <div id="confBar" class="h-full bg-gradient-to-r from-med-500 to-teal-400 rounded-full transition-all duration-700"></div>
         </div>
        </div>
       </div>
      </div><!-- Heatmap -->
      <div class="bg-slate-800/70 rounded-2xl p-5 border border-slate-700">
       <p class="text-xs text-slate-400 uppercase tracking-wider mb-3">Heatmap Analysis</p>
       <div class="xray-zone rounded-xl overflow-hidden bg-black mx-auto max-w-xs">
        <canvas id="heatmapCanvas" class="w-full"></canvas>
       </div>
      </div><!-- Referral -->
      <div class="bg-slate-800/70 rounded-2xl p-5 border border-slate-700">
       <p class="text-xs text-slate-400 uppercase tracking-wider mb-2">Referral Advice</p>
       <p id="resReferral" class="text-slate-200 leading-relaxed"></p>
      </div><!-- Regional report -->
      <div class="bg-slate-800/70 rounded-2xl p-5 border border-slate-700">
       <div class="flex items-center justify-between mb-2">
        <p class="text-xs text-slate-400 uppercase tracking-wider">Regional Language Report</p><select id="langSelect" onchange="changeLanguage()" class="bg-slate-700 text-xs text-white rounded-lg px-2 py-1 border-none outline-none"> <option value="hi">हिन्दी</option><option value="te">తెలుగు</option><option value="ta">தமிழ்</option><option value="bn">বাংলা</option><option value="mr">मराठी</option> </select>
       </div>
       <p id="resRegional" class="text-slate-200 leading-relaxed"></p>
      </div><!-- Actions -->
      <div class="flex flex-wrap gap-3 pb-8"><button onclick="printReport()" class="flex-1 min-w-[140px] py-3 rounded-xl bg-slate-800 border border-slate-700 hover:border-med-400 transition-colors font-medium text-sm flex items-center justify-center gap-2"> <i data-lucide="printer" class="w-4 h-4"></i> Print Report </button> <button onclick="goToPage('pageHome')" class="flex-1 min-w-[140px] py-3 rounded-xl bg-gradient-to-r from-med-500 to-teal-500 font-medium text-sm flex items-center justify-center gap-2"> <i data-lucide="plus" class="w-4 h-4"></i> New Scan </button>
      </div>
     </div>
    </div>
   </section>
  </div>
  <script>
// State
let feverVal = 'no', chestPainVal = 'no', uploadedImage = null;
let currentResult = null;

// Navigation
function goToPage(id) {
  document.querySelectorAll('#appShell > section').forEach(s => s.classList.add('hidden'));
  const el = document.getElementById(id);
  el.classList.remove('hidden');
  el.scrollIntoView({behavior:'smooth', block:'start'});
  if (id === 'pageResult' && !currentResult) return;
  lucide.createIcons();
}

// Upload
document.getElementById('xrayInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  uploadedImage = file;
  document.getElementById('uploadLabel').textContent = 'X-Ray uploaded ✓';
  document.getElementById('fileName').textContent = file.name;
  document.getElementById('btnStart').disabled = false;

  const reader = new FileReader();
  reader.onload = function(ev) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.getElementById('previewCanvas');
      canvas.width = img.width; canvas.height = img.height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
  document.getElementById('previewWrap').classList.remove('hidden');
});

// Fever toggle
function selectFever(btn, val) {
  feverVal = val;
  document.querySelectorAll('.fever-btn').forEach(b => { b.className = 'fever-btn flex-1 py-3 rounded-xl border border-slate-700 bg-slate-800 text-sm font-medium transition-all hover:border-med-400'; });
  btn.className = 'fever-btn flex-1 py-3 rounded-xl border border-med-400 bg-med-500/20 text-med-400 text-sm font-medium transition-all';
}
function selectChestPain(btn, val) {
  chestPainVal = val;
  document.querySelectorAll('.cp-btn').forEach(b => { b.className = 'cp-btn flex-1 py-3 rounded-xl border border-slate-700 bg-slate-800 text-sm font-medium transition-all hover:border-med-400'; });
  btn.className = 'cp-btn flex-1 py-3 rounded-xl border border-med-400 bg-med-500/20 text-med-400 text-sm font-medium transition-all';
}

// Simulated diseases
const diseases = [
  { name:'Pneumonia', conf:87, risk:'high', referral:'Immediate referral to Pulmonologist. Start empirical antibiotics. Monitor SpO2 closely.' },
  { name:'Tuberculosis (TB)', conf:78, risk:'high', referral:'Refer to DOTS center. Sputum AFB test recommended. Isolate patient.' },
  { name:'Pleural Effusion', conf:72, risk:'medium', referral:'Refer for thoracentesis. Chest CT recommended. Cardiology consult if bilateral.' },
  { name:'Cardiomegaly', conf:65, risk:'medium', referral:'Echocardiogram recommended. Cardiology referral. Monitor for heart failure signs.' },
  { name:'Normal', conf:94, risk:'low', referral:'No abnormality detected. Routine follow-up recommended.' }
];

const translations = {
  hi: { Pneumonia:'निमोनिया का पता चला। तुरंत फेफड़ों के विशेषज्ञ से मिलें।', 'Tuberculosis (TB)':'क्षय रोग (टीबी) का संदेह। DOTS केंद्र में जाँच कराएँ।', 'Pleural Effusion':'फुफ्फुस में पानी भरा है। आगे की जाँच ज़रूरी है।', Cardiomegaly:'हृदय बड़ा दिख रहा है। हृदय रोग विशेषज्ञ से मिलें।', Normal:'कोई असामान्यता नहीं। रिपोर्ट सामान्य है।' },
  te: { Pneumonia:'న్యుమోనియా గుర్తించబడింది. పల్మనాలజిస్ట్‌ను సంప్రదించండి.', 'Tuberculosis (TB)':'క్షయ వ్యాధి అనుమానం. DOTS కేంద్రాన్ని సందర్శించండి.', 'Pleural Effusion':'ఊపిరితిత్తులలో ద్రవం. తదుపరి పరీక్షలు అవసరం.', Cardiomegaly:'గుండె పెద్దదిగా కనిపిస్తోంది. కార్డియాలజిస్ట్‌ను సంప్రదించండి.', Normal:'అసాధారణత లేదు. రిపోర్ట్ సాధారణం.' },
  ta: { Pneumonia:'நிமோனியா கண்டறியப்பட்டது. நுரையீரல் நிபுணரை அணுகவும்.', 'Tuberculosis (TB)':'காசநோய் சந்தேகம். DOTS மையத்தை அணுகவும்.', 'Pleural Effusion':'நுரையீரலில் நீர் தேக்கம். மேலும் பரிசோதனை தேவை.', Cardiomegaly:'இதயம் பெரிதாக தெரிகிறது. இதய நிபுணரை அணுகவும்.', Normal:'அசாதாரணம் இல்லை. அறிக்கை சாதாரணம்.' },
  bn: { Pneumonia:'নিউমোনিয়া শনাক্ত হয়েছে। ফুসফুস বিশেষজ্ঞের কাছে যান।', 'Tuberculosis (TB)':'যক্ষ্মা সন্দেহ। DOTS কেন্দ্রে যান।', 'Pleural Effusion':'ফুসফুসে পানি জমেছে। আরও পরীক্ষা প্রয়োজন।', Cardiomegaly:'হৃদযন্ত্র বড় দেখাচ্ছে। কার্ডিওলজিস্টের পরামর্শ নিন।', Normal:'কোনো অস্বাভাবিকতা নেই। রিপোর্ট স্বাভাবিক।' },
  mr: { Pneumonia:'न्यूमोनिया आढळला. फुफ्फुस तज्ञांना भेटा.', 'Tuberculosis (TB)':'क्षयरोगाची शक्यता. DOTS केंद्राला भेट द्या.', 'Pleural Effusion':'फुफ्फुसात पाणी साचले आहे. पुढील तपासणी आवश्यक.', Cardiomegaly:'हृदय मोठे दिसत आहे. हृदयरोग तज्ञांना भेटा.', Normal:'कोणतीही विकृती नाही. अहवाल सामान्य आहे.' }
};

function runAnalysis() {
  goToPage('pageResult');
  document.getElementById('analyzing').classList.remove('hidden');
  document.getElementById('resultsContent').classList.add('hidden');

  // Pick disease based on symptoms
  const symptoms = [...document.querySelectorAll('#symptomsGrid input:checked')].map(c => c.value);
  const o2 = parseInt(document.getElementById('oxygen').value);
  let pick;
  if (o2 < 90 || (feverVal === 'yes' && symptoms.length >= 3)) pick = diseases[0];
  else if (symptoms.includes('night_sweats') || symptoms.includes('weight_loss')) pick = diseases[1];
  else if (chestPainVal === 'yes') pick = diseases[3];
  else if (symptoms.length >= 2) pick = diseases[2];
  else pick = diseases[4];

  currentResult = pick;

  setTimeout(() => {
    document.getElementById('analyzing').classList.add('hidden');
    document.getElementById('resultsContent').classList.remove('hidden');

    document.getElementById('resDisease').textContent = pick.name;
    document.getElementById('resConf').textContent = pick.conf + '%';
    document.getElementById('confBar').style.width = pick.conf + '%';
    document.getElementById('resReferral').textContent = pick.referral;

    const badge = document.getElementById('riskBadge');
    badge.textContent = pick.risk.toUpperCase() + ' RISK';
    badge.className = 'px-4 py-1.5 rounded-full text-sm font-semibold border risk-' + pick.risk;

    changeLanguage();
    drawHeatmap(pick);
    lucide.createIcons();
  }, 2200);
}

function changeLanguage() {
  if (!currentResult) return;
  const lang = document.getElementById('langSelect').value;
  const t = translations[lang];
  document.getElementById('resRegional').textContent = t[currentResult.name] || 'Translation not available.';
}

function drawHeatmap(disease) {
  const canvas = document.getElementById('heatmapCanvas');
  const size = 300;
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');

  // Draw dark base (simulated xray)
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, size, size);

  // Chest outline
  ctx.strokeStyle = '#1a3a2a';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.ellipse(size/2, size*0.55, size*0.35, size*0.4, 0, 0, Math.PI*2);
  ctx.stroke();
  // Ribcage lines
  for (let i = 0; i < 5; i++) {
    const y = size*0.3 + i*30;
    ctx.beginPath();
    ctx.ellipse(size/2, y, size*0.25 - i*5, 8, 0, 0, Math.PI);
    ctx.stroke();
  }

  // Heatmap blobs
  if (disease.name !== 'Normal') {
    const spots = disease.name === 'Cardiomegaly'
      ? [{x:size*0.45, y:size*0.55, r:50}]
      : disease.name === 'Pleural Effusion'
        ? [{x:size*0.7, y:size*0.65, r:45}]
        : [{x:size*0.35, y:size*0.4, r:35}, {x:size*0.6, y:size*0.45, r:28}];

    spots.forEach(s => {
      const grad = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.r);
      grad.addColorStop(0, 'rgba(239,68,68,0.7)');
      grad.addColorStop(0.4, 'rgba(245,158,11,0.4)');
      grad.addColorStop(1, 'rgba(16,185,88,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(s.x - s.r, s.y - s.r, s.r*2, s.r*2);
    });
  }
}

function printReport() {
  window.print();
}

// Element SDK
const defaultConfig = {
  app_title: 'MedScan AI',
  tagline: 'AI-Powered Chest X-Ray Analysis',
  background_color: '#091520',
  surface_color: '#1a2738',
  text_color: '#ffffff',
  primary_action_color: '#10b958',
  secondary_action_color: '#64748b',
  font_family: 'DM Sans',
  font_size: 16
};

function applyConfig(config) {
  const c = {...defaultConfig, ...config};
  document.getElementById('elTitle').textContent = c.app_title;
  document.getElementById('elTagline').textContent = c.tagline;

  const shell = document.getElementById('appShell');
  shell.style.backgroundColor = c.background_color;
  shell.style.color = c.text_color;
  shell.style.fontFamily = c.font_family + ', DM Sans, sans-serif';

  document.querySelectorAll('.bg-slate-800\\/70, .bg-slate-800\\/60, .bg-slate-800').forEach(el => {
    el.style.backgroundColor = c.surface_color;
  });
}

window.elementSdk.init({
  defaultConfig,
  onConfigChange: async (config) => { applyConfig(config); },
  mapToCapabilities: (config) => ({
    recolorables: [
      { get: () => config.background_color || defaultConfig.background_color, set: v => { config.background_color = v; window.elementSdk.setConfig({background_color:v}); }},
      { get: () => config.surface_color || defaultConfig.surface_color, set: v => { config.surface_color = v; window.elementSdk.setConfig({surface_color:v}); }},
      { get: () => config.text_color || defaultConfig.text_color, set: v => { config.text_color = v; window.elementSdk.setConfig({text_color:v}); }},
      { get: () => config.primary_action_color || defaultConfig.primary_action_color, set: v => { config.primary_action_color = v; window.elementSdk.setConfig({primary_action_color:v}); }},
      { get: () => config.secondary_action_color || defaultConfig.secondary_action_color, set: v => { config.secondary_action_color = v; window.elementSdk.setConfig({secondary_action_color:v}); }}
    ],
    borderables: [],
    fontEditable: {
      get: () => config.font_family || defaultConfig.font_family,
      set: v => { config.font_family = v; window.elementSdk.setConfig({font_family:v}); }
    },
    fontSizeable: {
      get: () => config.font_size || defaultConfig.font_size,
      set: v => { config.font_size = v; window.elementSdk.setConfig({font_size:v}); }
    }
  }),
  mapToEditPanelValues: (config) => new Map([
    ['app_title', config.app_title || defaultConfig.app_title],
    ['tagline', config.tagline || defaultConfig.tagline]
  ])
});

lucide.createIcons();
